<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dis-moi Tout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="assets/scss/style.css">
</head>
<body>

<main class="conteneur-app">

    <section id="ecran-accueil" class="ecran ecran--actif">
        <div class="hero-section">
            <span class="material-symbols-rounded" style="font-size: 4rem; color: #FF6B6B; margin-bottom: 20px;">question_answer</span>
            <h1>Dis-moi<br>Tout</h1>
            <p>Le jeu pour briser la glace ou aller plus loin.</p>
            <button class="bouton bouton--primaire" onclick="ui.naviguerVers('ecran-selection')">COMMENCER</button>
            <div style="margin-top: 30px; display: flex; gap: 20px;">
                <button class="bouton-icone" onclick="ui.naviguerVers('ecran-favoris')"><span class="material-symbols-rounded">favorite</span></button>
                <button class="bouton-icone" onclick="ui.naviguerVers('ecran-admin')"><span class="material-symbols-rounded">add_circle</span></button>
            </div>
        </div>
    </section>

    <section id="ecran-selection" class="ecran">
        <header class="entete-app">
            <button class="bouton-icone" onclick="ui.naviguerVers('ecran-accueil')"><span class="material-symbols-rounded">arrow_back</span></button>
            <h2>Modes de jeu</h2>
            <div style="width: 40px;"></div>
        </header>

        <div class="selecteur-container">
            <div class="ligne-controle">
                <span class="label-controle">Âge :</span>
                <div class="selecteur-age-pills">
                    <label><input type="radio" name="age-select" value="enfant" onchange="jeu.majModesUI()"> Enfant</label>
                    <label><input type="radio" name="age-select" value="ado" onchange="jeu.majModesUI()"> Ado</label>
                    <label><input type="radio" name="age-select" value="adulte" checked onchange="jeu.majModesUI()"> Adulte</label>
                    <label><input type="radio" name="age-select" value="18+" onchange="jeu.majModesUI()"> 18+</label>
                </div>
            </div>
            
            <div class="ligne-controle">
                <span class="label-controle"><span class="material-symbols-rounded">timer</span> Chrono :</span>
                <div class="select-wrapper">
                    <select id="select-chrono">
                        <option value="0">Aucun</option>
                        <option value="10">10 sec</option>
                        <option value="30">30 sec</option>
                        <option value="60">1 min</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="conteneur-grille">
            <div class="grille-packs">
                <button class="carte-pack carte-pack--couple" onclick="jeu.lancerPreset('couple')">
                    <div class="icone-pack"><span class="material-symbols-rounded">favorite</span></div>
                    <h3>En Couple</h3><p>Renforcez vos liens</p>
                </button>

                <button class="carte-pack carte-pack--hot" id="btn-hot" onclick="jeu.lancerPreset('hot')">
                    <div class="icone-pack"><span class="material-symbols-rounded">local_fire_department</span></div>
                    <h3>Intimacy (18+)</h3><p>Sans tabous</p>
                </button>

                <button class="carte-pack carte-pack--quiz" onclick="jeu.lancerPreset('connaissance')">
                    <div class="icone-pack"><span class="material-symbols-rounded">psychology_alt</span></div>
                    <h3>Tu me connais ?</h3><p>Le test ultime</p>
                </button>

                <button class="carte-pack carte-pack--famille" onclick="jeu.lancerPreset('famille')">
                    <div class="icone-pack"><span class="material-symbols-rounded">diversity_3</span></div>
                    <h3>En Famille</h3><p>Pour tous</p>
                </button>
                
                <button class="carte-pack carte-pack--profond" onclick="jeu.lancerPreset('profond')">
                    <div class="icone-pack"><span class="material-symbols-rounded">bedtime</span></div>
                    <h3>Deep Night</h3><p>Confessions</p>
                </button>

                <button class="carte-pack carte-pack--date" onclick="jeu.lancerPreset('date')">
                    <div class="icone-pack"><span class="material-symbols-rounded">local_bar</span></div>
                    <h3>Premier Date</h3><p>Briser la glace</p>
                </button>

                <button class="carte-pack carte-pack--potes" onclick="jeu.lancerPreset('potes')">
                    <div class="icone-pack"><span class="material-symbols-rounded">groups</span></div>
                    <h3>Entre Potes</h3><p>Fun et délires</p>
                </button>

                <button class="carte-pack carte-pack--preferes" onclick="jeu.lancerPreset('tu_preferes')">
                    <div class="icone-pack"><span class="material-symbols-rounded">thumbs_up_down</span></div>
                    <h3>Tu préfères ?</h3><p>Dilemmes</p>
                </button>

                <button class="carte-pack carte-pack--miroir" onclick="jeu.lancerPreset('miroir')">
                    <div class="icone-pack"><span class="material-symbols-rounded">self_improvement</span></div>
                    <h3>Miroir</h3><p>Introspection</p>
                </button>

                <button class="carte-pack carte-pack--fun" onclick="jeu.lancerPreset('fun')">
                    <div class="icone-pack"><span class="material-symbols-rounded">celebration</span></div>
                    <h3>Fun</h3><p>Juste pour rire</p>
                </button>

                <button class="carte-pack carte-pack--aleatoire" onclick="jeu.lancerAleatoire()">
                    <div class="icone-pack"><span class="material-symbols-rounded">shuffle</span></div>
                    <h3>Aléatoire</h3><p>Hasard total</p>
                </button>
            </div>
        </div>
    </section>

    <section id="ecran-jeu" class="ecran">
        <div class="conteneur-jeu-centre">
            <header class="entete-app" style="background:transparent; padding:0; margin-bottom: 10px;">
                <button class="bouton-icone" onclick="jeu.quitter()"><span class="material-symbols-rounded">close</span></button>
                <div class="compteur-questions" id="compteur-questions">1 / 20</div>
                <button class="bouton-icone" onclick="jeu.toggleFavori()"><span class="material-symbols-rounded" id="icone-favori">favorite_border</span></button>
            </header>

            <div id="barre-chrono-container" class="barre-chrono-container">
                <div id="barre-chrono"></div>
            </div>

            <div class="zone-carte">
                <div id="carte-jeu" class="carte">
                    <span class="etiquette-carte" id="tag-carte">Catégorie</span>
                    <div class="contenu-scrollable">
                        <p class="contenu-carte" id="texte-carte">Chargement...</p>
                    </div>
                    <div class="indicateur-swipe indicateur-swipe--like"><span class="material-symbols-rounded">check_circle</span></div>
                    <div class="indicateur-swipe indicateur-swipe--pass"><span class="material-symbols-rounded">cancel</span></div>
                </div>
            </div>

            <div class="controles-jeu">
                <button class="bouton-rond bouton-rond--passer" onclick="jeu.carteSuivante('gauche')"><span class="material-symbols-rounded">close</span></button>
                <button class="bouton-rond bouton-rond--valider" onclick="jeu.carteSuivante('droite')"><span class="material-symbols-rounded">check</span></button>
            </div>
        </div>
    </section>

    <section id="ecran-favoris" class="ecran">
        <header class="entete-app">
            <button class="bouton-icone" onclick="ui.naviguerVers('ecran-accueil')"><span class="material-symbols-rounded">arrow_back</span></button>
            <h2>Mes Favoris</h2>
            <div style="width: 40px;"></div>
        </header>
        <div id="liste-favoris" class="grille-favoris"></div>
    </section>

    <section id="ecran-admin" class="ecran">
        <header class="entete-app">
            <button class="bouton-icone" onclick="ui.naviguerVers('ecran-accueil')"><span class="material-symbols-rounded">arrow_back</span></button>
            <h2>Créateur</h2>
            <div style="width: 40px;"></div>
        </header>
        <div class="scroll-admin">
            <form class="formulaire-admin" onsubmit="event.preventDefault(); admin.ajouterQuestion();">
                <div class="champ">
                    <label>Ta question</label>
                    <textarea id="admin-contenu" rows="3" placeholder="Écris ta question ici..." required></textarea>
                </div>
                <div class="champ">
                    <label>Âge minimum</label>
                    <select id="admin-age">
                        <option value="enfant">Enfant (Tout public)</option>
                        <option value="ado">Ado (13+)</option>
                        <option value="adulte">Adulte (18+)</option>
                        <option value="18+">Hot (Explicit)</option>
                    </select>
                </div>
                <div class="champ">
                    <label>Catégories (Plusieurs choix possibles)</label>
                    <div class="groupe-checkbox" id="admin-categories">
                        <label><input type="checkbox" value="couple"> Couple</label>
                        <label><input type="checkbox" value="hot"> Hot</label>
                        <label><input type="checkbox" value="famille"> Famille</label>
                        <label><input type="checkbox" value="amis"> Potes</label>
                        <label><input type="checkbox" value="fun"> Fun</label>
                        <label><input type="checkbox" value="profond"> Profond</label>
                        <label><input type="checkbox" value="date"> Date</label>
                        <label><input type="checkbox" value="tu_preferes"> Dilemme</label>
                        <label><input type="checkbox" value="connaissance"> Connaissance</label>
                        <label><input type="checkbox" value="miroir"> Miroir</label>
                    </div>
                </div>
                <div class="actions-admin">
                    <button type="submit" class="bouton bouton--primaire">Ajouter</button>
                    <button type="button" class="bouton bouton--secondaire" onclick="admin.exporterJSON()">Copier JSON</button>
                </div>
            </form>
        </div>
    </section>

</main>
<script src="assets/js/jeu.js"></script>
</body>
</html>
